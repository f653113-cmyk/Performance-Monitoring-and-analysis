name: Daily Data Sync

on:
  schedule:
    - cron: '0 0 * * *'  # 00:00 UTC daily
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch data from Victron VRM
        run: python victron_fetcher.py
        env:
          VRM_API_TOKEN: ${{ secrets.VRM_API_TOKEN }}

      - name: Analyze data
        run: python analyzer.py

      - name: Generate dashboards
        run: python dashboard_generator.py

      - name: Upload dashboards as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboards
          path: reports/
          retention-days: 90
          if-no-files-found: ignore

      - name: Commit and push updates
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/ reports/ || true
          git commit -m "Daily data sync - $(date -u +'%Y-%m-%d %H:%M UTC')" || true
          git push || true
